name: Build SF Tools & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm test:classify

      - run: pnpm build

      - name: Zip extension
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r ../sftools-${{ github.ref_name }}.zip .

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: sftools-${{ github.ref_name }}.zip
          generate_release_notes: true
