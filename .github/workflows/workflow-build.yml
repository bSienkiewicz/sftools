name: Build & Release

# Runs only when a version tag (v*) is pushed — create tags on master commits.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag points to master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/master; then
            echo "::error::Tag must be on a commit reachable from master."
            exit 1
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:classify

      - run: pnpm build

      - name: Zip extension
        run: cd dist && zip -r ../sftools-${{ github.ref_name }}.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: sftools-${{ github.ref_name }}.zip
          generate_release_notes: true
